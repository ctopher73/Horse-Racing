[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# IMPORTANT: this rule must come BEFORE the catch-all SPA redirect below.
# Netlify's redirect engine uses first-match-wins, and a blanket "/*" rule
# can shadow /.netlify/functions/* requests on some setups, causing the
# function endpoints to incorrectly return index.html instead of running.
# Keeping this explicit pass-through first guarantees coach.js and
# racecard.js stay reachable regardless of redirect-engine edge cases.
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
